<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarav's World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
  color: #fff; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

header { text-align: center; margin-bottom: 40px; }
header h1 {
  font-size: 56px; color: #ffcc00;
  text-shadow: 0 0 20px rgba(255,200,0,0.5), 0 0 60px rgba(255,200,0,0.2);
  letter-spacing: 2px;
}
header p { font-size: 18px; color: #aaa; margin-top: 8px; }

.cards {
  display: flex; gap: 32px; flex-wrap: wrap; justify-content: center;
  padding: 0 24px; max-width: 800px;
}

.card {
  background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 40px 36px; text-align: center; color: #fff;
  text-decoration: none; width: 320px;
  transition: all 0.25s ease; display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}
.card:hover {
  transform: translateY(-8px); border-color: rgba(255,200,0,0.5);
  background: rgba(255,255,255,0.1); box-shadow: 0 16px 50px rgba(255,200,0,0.15);
}

.card-icon { font-size: 72px; }
.card h2 { font-size: 26px; }
.card p { font-size: 14px; color: #aaa; line-height: 1.5; }

.enter-tag {
  margin-top: auto; padding: 8px 28px; border: 2px solid #00b894;
  border-radius: 10px; font-size: 15px; font-weight: bold; color: #00b894;
  transition: all 0.2s;
}
.card:hover .enter-tag { background: #00b894; color: #fff; }

footer { margin-top: 50px; font-size: 13px; color: #444; }

.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
.star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 3s infinite alternate; }
@keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <h1>🌟 Aarav's World</h1>
  <p>Choose your adventure!</p>
</header>

<div class="cards">
  <a class="card" href="aaravs_arcade.html">
    <div class="card-icon">🕹️</div>
    <h2>Aarav's Arcade</h2>
    <p>Play awesome games — Bowser Boss Battle, Dino Runner, Tic Tac Toe & Rock Paper Scissors!</p>
    <div class="enter-tag">PLAY GAMES</div>
  </a>

  <a class="card" href="reading_adventure.html">
    <div class="card-icon">📖</div>
    <h2>Reading Adventure</h2>
    <p>Read stories, answer questions, earn coins and level up your reading skills!</p>
    <div class="enter-tag">START READING</div>
  </a>
</div>

<footer>Made with ❤️ by Aarav</footer>

<script>
var el = document.getElementById('stars');
for (var i = 0; i < 80; i++) {
  var s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
  el.appendChild(s);
}
</script>

</body>
</html>
