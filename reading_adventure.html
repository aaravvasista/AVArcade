<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Adventure! 📚⭐</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #333;
    overflow-x: hidden;
  }

  /* Floating background shapes */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    opacity: 0.1;
    z-index: 0;
    animation: float 6s ease-in-out infinite;
  }
  body::before {
    width: 300px; height: 300px;
    background: #fff;
    top: -50px; left: -50px;
  }
  body::after {
    width: 200px; height: 200px;
    background: #ffd700;
    bottom: -30px; right: -30px;
    animation-delay: 3s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    80% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes starPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px 15px 10px;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 5vw, 48px);
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    animation: popIn 0.6s ease;
  }

  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px auto;
    flex-wrap: wrap;
  }
  .score-badge {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 8px 20px;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-badge .icon { font-size: 20px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 10px auto 30px;
    padding: 0 15px;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    animation: slideUp 0.4s ease;
  }

  .hidden { display: none !important; }

  /* Home Screen */
  .home-title {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #764ba2;
    text-align: center;
    margin-bottom: 8px;
  }
  .home-subtitle {
    text-align: center;
    color: #888;
    font-size: 16px;
    margin-bottom: 24px;
  }

  .story-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .story-card {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 16px 20px;
    border-radius: 16px;
    border: 2.5px solid #e8e8e8;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .story-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  .story-card.small { border-left: 5px solid #4CAF50; }
  .story-card.medium { border-left: 5px solid #FF9800; }
  .story-card.large { border-left: 5px solid #E91E63; }
  .story-card.locked { opacity: 0.5; cursor: not-allowed; }
  .story-card.locked:hover { transform: none; box-shadow: none; }
  .story-card.completed { border-color: #4CAF50; background: #f0fff0; }
  .story-card.completed::after {
    content: '✅';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
  }

  .story-emoji { font-size: 36px; flex-shrink: 0; }
  .story-info { flex: 1; }
  .story-info h3 { font-size: 16px; font-weight: 800; color: #333; margin-bottom: 2px; }
  .story-info .meta { font-size: 13px; color: #999; }
  .story-info .meta .size-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    margin-right: 6px;
  }
  .size-tag.small { background: #4CAF50; }
  .size-tag.medium { background: #FF9800; }
  .size-tag.large { background: #E91E63; }

  .lock-icon {
    font-size: 20px;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Story Reading Screen */
  .story-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: #f0f0f0;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: #ddd; }

  .story-title-bar h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #764ba2;
  }
  .story-title-bar .story-size {
    font-size: 13px;
    color: #999;
  }

  .story-content {
    font-size: 19px;
    line-height: 1.9;
    color: #444;
    padding: 20px;
    background: #fafafa;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 2px dashed #e0e0e0;
  }

  .quiz-ready-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: bounce 1s ease infinite;
  }
  .quiz-ready-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 6px 25px rgba(118,75,162,0.4);
    animation: none;
  }

    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    justify-content: center;
  }
  .quiz-dot {
    width: 32px;
    height: 8px;
    border-radius: 4px;
    background: #e0e0e0;
    transition: background 0.3s;
  }
  .quiz-dot.active { background: #764ba2; }
  .quiz-dot.correct { background: #4CAF50; }
  .quiz-dot.wrong { background: #f44336; }

  .quiz-question-num {
    text-align: center;
    color: #999;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .quiz-question {
    font-size: 20px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 24px;
    color: #333;
  }

    grid-template-columns: 1fr;

  .quiz-option {

    border-radius: 14px;
    background: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: #444;
    font-family: 'Nunito', sans-serif;
  }
  .quiz-option:hover {
    border-color: #764ba2;
    background: #f8f0ff;
    transform: translateX(4px);
  }
  .quiz-option.correct {
    border-color: #4CAF50;
    background: #e8f5e9;
    color: #2e7d32;
    animation: popIn 0.3s ease;
  }
  .quiz-option.wrong {
    border-color: #f44336;
    background: #ffebee;
    color: #c62828;
    animation: shake 0.4s ease;
  }
  .quiz-option.disabled {
    pointer-events: none;
    opacity: 0.6;
  }
  .quiz-option.reveal-correct {
    border-color: #4CAF50;
    background: #e8f5e9;
    color: #2e7d32;
    opacity: 1;
  }

  .quiz-feedback {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    margin: 16px 0;
    animation: popIn 0.3s ease;
  }

  .next-q-btn {
    display: block;
    margin: 16px auto 0;
    padding: 12px 32px;
    background: #764ba2;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .next-q-btn:hover { background: #5e3a85; }

  /* Results Screen */
  .results-emoji {
    font-size: 64px;
    text-align: center;
    margin-bottom: 10px;

  .results-title {
    font-family: 'Fredoka One', cursive;

    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    color: #764ba2;
  }
  .results-stat .label {
    font-size: 13px;
    color: #999;
    font-weight: 700;
  }
  .results-stars {
    text-align: center;
    font-size: 36px;
    margin-bottom: 16px;
    animation: starPulse 1s ease infinite;
  }
  .results-msg {
    text-align: center;
    font-size: 16px;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-weight: 700;
  }
  .results-msg.pass { background: #e8f5e9; color: #2e7d32; }
  .results-msg.fail { background: #fff3e0; color: #e65100; }

  .results-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .results-btns button {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
    font-family: 'Nunito', sans-serif;
  }
  .results-btns button:hover { transform: scale(1.05); }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-secondary { background: #f0f0f0; color: #555; }

  /* Reset button */
  .reset-btn {
    display: block;
    margin: 20px auto 0;
    padding: 10px 20px;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.6);
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    margin-bottom: 30px;
  }
  .reset-btn:hover {
    border-color: rgba(255,255,255,0.6);
    color: #fff;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    z-index: 999;
    animation: confettiFall linear forwards;
  }

  /* Progress bar on home */
  .overall-progress {
    margin-bottom: 20px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 14px;
    background: #eee;
    border-radius: 7px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #81C784);
    border-radius: 7px;
    transition: width 0.5s ease;
  }
  .progress-text {
    text-align: center;
    font-size: 13px;
    color: #999;
    margin-top: 4px;
    font-weight: 700;
  }
</style>
</head>

// ==================== STATE ====================
let totalPoints = parseInt(localStorage.getItem('ra_points')) || 0;
let completedStories = JSON.parse(localStorage.getItem('ra_completed') || '[]');

let currentStoryIndex = -1;
let currentQuestionIndex = 0;
let quizScore = 0;
let quizAnswers = []; // track per-question result

function saveState() {
  localStorage.setItem('ra_points', totalPoints);
  localStorage.setItem('ra_completed', JSON.stringify(completedStories));
}

function updateScoreboard() {
  document.getElementById('pointsDisplay').textContent = totalPoints;
  document.getElementById('storiesDisplay').textContent = completedStories.length;
}

// ==================== SCREENS ====================
function showOnly(id) {
  ['homeScreen','storyScreen','quizScreen','resultsScreen'].forEach(function(s) {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// ==================== HOME ====================
function showHome() {
  showOnly('homeScreen');
  updateScoreboard();

  var completedCount = completedStories.length;
  var pct = Math.round((completedCount / ALL_STORIES.length) * 100);

  var html = '<div class="home-title">Choose a Story! 📖</div>' +
    '<div class="home-subtitle">Read stories and answer questions to earn points!</div>' +
    '<div class="overall-progress">' +
    '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="progress-text">' + completedCount + ' of ' + ALL_STORIES.length + ' stories completed (' + pct + '%)</div>' +
    '</div>' +
    '<div class="story-grid">';

  ALL_STORIES.forEach(function(story, i) {
    var done = completedStories.indexOf(story.id) !== -1;
    // A story is locked if the previous story (by index) is not completed, except the first one
    var locked = i > 0 && completedStories.indexOf(ALL_STORIES[i - 1].id) === -1 && !done;

    html += '<div class="story-card ' + story.size + (done ? ' completed' : '') + (locked ? ' locked' : '') + '"' +
      ' data-index="' + i + '"' + (locked ? '' : ' role="button" tabindex="0"') + '>' +
      '<div class="story-emoji">' + story.emoji + '</div>' +
      '<div class="story-info">' +
      '<h3>' + story.title + '</h3>' +
      '<div class="meta">' +
      '<span class="size-tag ' + story.size + '">' + story.size.toUpperCase() + '</span>' +
      story.topic +
      '</div></div>' +
      (locked ? '<span class="lock-icon">🔒</span>' : '') +
      '</div>';
  });

  html += '</div>';

  if (completedCount === ALL_STORIES.length) {
    html += '<div style="text-align:center;margin-top:20px;">' +
      '<div style="font-size:40px;">🏆🎉🌟</div>' +
      '<div class="home-title" style="color:#4CAF50;">You finished ALL stories! Amazing job!</div>' +
      '<div class="home-subtitle">Total Points: ' + totalPoints + '</div>' +
      '</div>';
  }

  document.getElementById('homeScreen').innerHTML = html;

  // attach click handlers
  var cards = document.querySelectorAll('.story-card:not(.locked)');
  for (var c = 0; c < cards.length; c++) {
    (function(card) {
      card.addEventListener('click', function() {
        var idx = parseInt(card.getAttribute('data-index'));
        openStory(idx);
      });
    })(cards[c]);
  }
}

// ==================== STORY READING ====================
function openStory(index) {
  currentStoryIndex = index;
  var story = ALL_STORIES[index];
  showOnly('storyScreen');

  var paragraphs = story.text.split('\n\n');
  var storyHtml = '';
  for (var p = 0; p < paragraphs.length; p++) {
    storyHtml += '<p style="margin-bottom:14px;">' + paragraphs[p].trim() + '</p>';
  }

  document.getElementById('storyScreen').innerHTML =
    '<div class="story-header">' +
    '<button class="back-btn" id="storyBackBtn">⬅</button>' +
    '<div class="story-title-bar">' +
    '<h2>' + story.emoji + ' ' + story.title + '</h2>' +
    '<div class="story-size"><span class="size-tag ' + story.size + '">' + story.size.toUpperCase() + '</span> ' + story.topic + '</div>' +
    '</div></div>' +
    '<div class="story-content">' + storyHtml + '</div>' +
    '<button class="quiz-ready-btn" id="startQuizBtn">I\'m Ready for Questions! 🧠</button>';

  document.getElementById('storyBackBtn').addEventListener('click', showHome);
  document.getElementById('startQuizBtn').addEventListener('click', startQuiz);
}

// ==================== QUIZ ====================
function startQuiz() {
  currentQuestionIndex = 0;
  quizScore = 0;
  quizAnswers = [];
  showOnly('quizScreen');
  showQuestion();
}

function showQuestion() {
  var story = ALL_STORIES[currentStoryIndex];
  var total = story.questions.length;
  var qData = story.questions[currentQuestionIndex];

  var dotsHtml = '';
  for (var i = 0; i < total; i++) {
    var cls = 'quiz-dot';
    if (i < quizAnswers.length) cls += quizAnswers[i] ? ' correct' : ' wrong';
    else if (i === currentQuestionIndex) cls += ' active';
    dotsHtml += '<div class="' + cls + '"></div>';
  }

  var optsHtml = '';
  for (var j = 0; j < qData.opts.length; j++) {
    optsHtml += '<button class="quiz-option" data-idx="' + j + '">' + qData.opts[j] + '</button>';
  }

  document.getElementById('quizScreen').innerHTML =
    '<div class="story-header">' +
    '<button class="back-btn" id="quizBackBtn">⬅</button>' +
    '<div class="story-title-bar">' +
    '<h2>🧠 Quiz Time!</h2>' +
    '<div class="story-size">' + story.title + '</div>' +
    '</div></div>' +
    '<div class="quiz-progress">' + dotsHtml + '</div>' +
    '<div class="quiz-question-num">Question ' + (currentQuestionIndex + 1) + ' of ' + total + '</div>' +
    '<div class="quiz-question">' + qData.q + '</div>' +
    '<div class="quiz-options">' + optsHtml + '</div>' +
    '<div id="feedbackArea"></div>';

  document.getElementById('quizBackBtn').addEventListener('click', function() { openStory(currentStoryIndex); });

  var optBtns = document.querySelectorAll('.quiz-option');
  for (var k = 0; k < optBtns.length; k++) {
    (function(btn) {
      btn.addEventListener('click', function() { handleAnswer(parseInt(btn.getAttribute('data-idx'))); });
    })(optBtns[k]);
  }
}

function handleAnswer(chosenIdx) {
  var story = ALL_STORIES[currentStoryIndex];
  var qData = story.questions[currentQuestionIndex];
  var correct = chosenIdx === qData.ans;

  if (correct) {
    quizScore++;
    totalPoints += 20;
    updateScoreboard();
  }
  quizAnswers.push(correct);

  // highlight options
  var allOpts = document.querySelectorAll('.quiz-option');
  for (var i = 0; i < allOpts.length; i++) {
    var idx = parseInt(allOpts[i].getAttribute('data-idx'));
    allOpts[i].classList.add('disabled');
    if (idx === qData.ans) allOpts[i].classList.add(correct && idx === chosenIdx ? 'correct' : 'reveal-correct');
    if (idx === chosenIdx && !correct) allOpts[i].classList.add('wrong');
  }

  // feedback
  var fb = document.getElementById('feedbackArea');
  if (correct) {
    fb.innerHTML = '<div class="quiz-feedback" style="color:#4CAF50;">✅ Correct! +20 points!</div>';
  } else {
    fb.innerHTML = '<div class="quiz-feedback" style="color:#f44336;">❌ Not quite! The answer is highlighted in green.</div>';
  }

  // next button
  var isLast = currentQuestionIndex >= story.questions.length - 1;
  fb.innerHTML += '<button class="next-q-btn" id="nextQBtn">' + (isLast ? 'See Results 🎯' : 'Next Question ➡️') + '</button>';
  document.getElementById('nextQBtn').addEventListener('click', function() {
    if (isLast) {
      showResults();
    } else {
      currentQuestionIndex++;
      showQuestion();
    }
  });
}

// ==================== RESULTS ====================
function showResults() {
  var story = ALL_STORIES[currentStoryIndex];
  var total = story.questions.length;
  var passed = quizScore >= 4;
  var pointsEarned = quizScore * 20;

  if (passed && completedStories.indexOf(story.id) === -1) {
    completedStories.push(story.id);
  }
  saveState();
  updateScoreboard();

  var stars = quizScore === 5 ? '⭐⭐⭐' : quizScore === 4 ? '⭐⭐' : quizScore >= 3 ? '⭐' : '';
  var emoji, title;
  if (quizScore === 5) { emoji = '🎉'; title = 'Perfect Score!'; }
  else if (quizScore === 4) { emoji = '🌟'; title = 'Great Job!'; }
  else if (quizScore === 3) { emoji = '😊'; title = 'Good Try!'; }
  else { emoji = '💪'; title = 'Keep Trying!'; }

  showOnly('resultsScreen');

  var html =
    '<div class="results-emoji">' + emoji + '</div>' +
    '<div class="results-title">' + title + '</div>' +
    '<div class="results-subtitle">' + story.title + '</div>' +
    (stars ? '<div class="results-stars">' + stars + '</div>' : '') +
    '<div class="results-score-box">' +
    '<div class="results-stat"><div class="big">' + quizScore + '/' + total + '</div><div class="label">Correct</div></div>' +
    '<div class="results-stat"><div class="big">+' + pointsEarned + '</div><div class="label">Points Earned</div></div>' +
    '</div>';

  if (passed) {
    html += '<div class="results-msg pass">🎊 You passed! You can move on to the next story!</div>';
  } else {
    html += '<div class="results-msg fail">You need at least 4 out of 5 correct to move on. Read the story again and try the quiz! 📖</div>';
  }

  html += '<div class="results-btns">';
  if (!passed) {
    html += '<button class="btn-primary" id="retryBtn">📖 Read Again</button>';
  }
  html += '<button class="' + (passed ? 'btn-primary' : 'btn-secondary') + '" id="homeBtn">🏠 Back to Stories</button>';
  html += '</div>';

  document.getElementById('resultsScreen').innerHTML = html;

  if (!passed) {
    document.getElementById('retryBtn').addEventListener('click', function() { openStory(currentStoryIndex); });
  }
  document.getElementById('homeBtn').addEventListener('click', showHome);

  if (passed) launchConfetti();
}

// ==================== CONFETTI ====================
function launchConfetti() {
  var colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bcb','#a66cff'];
  for (var i = 0; i < 50; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = (Math.random() * 1.5) + 's';
    document.body.appendChild(piece);
    (function(p) { setTimeout(function() { p.remove(); }, 5000); })(piece);
  }
}

// ==================== RESET ====================
document.getElementById('resetBtn').addEventListener('click', function() {
  if (confirm('Start over? This will reset all your points and progress.')) {
    localStorage.removeItem('ra_points');
    localStorage.removeItem('ra_completed');
    totalPoints = 0;
    completedStories = [];
    saveState();
    updateScoreboard();
    showHome();
  }
});

// ==================== INIT ====================
updateScoreboard();
showHome();
</script>
</body>
</html>
